<!doctype html>
<html lang="en">
  <head>
    <title>Browser not supported (406) - Revdoku</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #f8fafc;
        color: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      .container {
        text-align: center;
        padding: 2rem;
        max-width: 520px;
      }

      .brand {
        display: inline-block;
        font-size: 2.5rem;
        font-weight: 800;
        color: #2563eb;
        letter-spacing: 0.02em;
        text-decoration: none;
        margin-bottom: 2.5rem;
      }

      .brand:hover { color: #1d4ed8; }

      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 1.5rem;
      }

      .code {
        font-size: 4.5rem;
        font-weight: 800;
        color: #2563eb;
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .title {
        font-size: 1.25rem;
        font-weight: 600;
        color: #1a1a1a;
        margin-top: 0.5rem;
      }

      .description {
        font-size: 0.95rem;
        color: #6b7280;
        margin-top: 0.75rem;
        line-height: 1.6;
      }

      .actions {
        margin-top: 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        padding: 0.625rem 1.5rem;
        border-radius: 0.5rem;
        transition: background 0.15s;
      }

      .btn-primary:hover { background: #1d4ed8; }

      .btn-primary svg { width: 16px; height: 16px; }

      .support {
        font-size: 0.85rem;
        color: #9ca3af;
        margin-top: 2.5rem;
      }

      .support a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 500;
      }

      .support a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="https://revdoku.com" class="brand">REVDOKU</a>
      <div class="icon">
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <rect x="56" y="96" width="400" height="288" rx="24" fill="#2563eb"/>
          <rect x="56" y="96" width="400" height="64" rx="24" fill="#1d4ed8"/>
          <circle cx="96" cy="128" r="10" fill="white"/>
          <circle cx="128" cy="128" r="10" fill="white"/>
          <circle cx="160" cy="128" r="10" fill="white"/>
          <path d="M256 232v80M256 352h.01" stroke="white" stroke-width="32" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="code">406</div>
      <div class="title">Browser not supported</div>
      <p class="description">
        Revdoku needs a modern browser to run. Please switch to the latest Chrome, Firefox, Safari, or Edge and try again.
      </p>
      <div class="actions">
        <a href="https://revdoku.com" class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
          Go to revdoku.com
        </a>
      </div>
      <p class="support">
        Questions? Contact us at <a href="mailto:support@revdoku.com">support@revdoku.com</a>
      </p>
    </div>
  </body>
</html>
