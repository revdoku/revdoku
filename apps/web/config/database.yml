# SQLite3 Database Configuration
# Performance pragmas configured in config/initializers/sqlite_config.rb
#
# Database files are stored in the storage/ directory
# For production, use environment variables to configure paths:
#   DATABASE_PATH=/rails/storage/production.sqlite3
#
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  cache:
    <<: *default
    database: storage/development_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/development_cable.sqlite3
    migrations_paths: db/cable_migrate
  audit:
    <<: *default
    database: storage/development_audit.sqlite3
    migrations_paths: db/audit_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary:
    <<: *default
    database: storage/test.sqlite3
  cache:
    <<: *default
    database: storage/test_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/test_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/test_cable.sqlite3
    migrations_paths: db/cable_migrate
  audit:
    <<: *default
    database: storage/test_audit.sqlite3
    migrations_paths: db/audit_migrate

# Production uses environment variables for database paths
# See config/initializers/sqlite_config.rb for performance configuration
production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DATABASE_PATH", "/rails/storage/production.sqlite3") %>
  cache:
    <<: *default
    database: <%= ENV.fetch("CACHE_DATABASE_PATH", "/rails/storage/production_cache.sqlite3") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV.fetch("QUEUE_DATABASE_PATH", "/rails/storage/production_queue.sqlite3") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("CABLE_DATABASE_PATH", "/rails/storage/production_cable.sqlite3") %>
    migrations_paths: db/cable_migrate
  audit:
    <<: *default
    database: <%= ENV.fetch("AUDIT_DATABASE_PATH", "/rails/storage/production_audit.sqlite3") %>
    migrations_paths: db/audit_migrate
