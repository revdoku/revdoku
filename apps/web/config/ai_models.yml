# AI Models Catalog.
#
# Region tree:
#   shared.regions.<region>.{defaults, aliases, providers}
#
# Every model id is 3-segment: "{region}:{provider}:{api_name}". The
# default `any` region is "no compliance lock — works anywhere":
# OpenRouter, OpenAI, Anthropic, Google direct, plus tenant-controlled
# Custom LLMs.
#
# UI surface: the picker lists ONLY the aliases below — "Gemini · Standard",
# "GPT · Basic", etc. — never the concrete per-provider models. Each alias
# resolves at call time to the first of its `targets` whose provider has
# an API key available. Operators configure one or more provider keys;
# the aliases automatically light up.

shared:
  default_region: "any"

  regions:
    any:
      label: "Any"
      # Defaults reach for the alias layer so the resolver picks the first
      # provider with a working key (e.g. account BYOK on OpenRouter,
      # operator ENV on OpenAI, etc.).
      defaults:
        inspection: "any:gpt-normal"
        checklist_generation: "any:gpt-normal"
        text_extraction: "any:gemini-flash-lite"

      # User-facing aliases. Each id is `any:<name>`. Picker shows only
      # these; concrete provider models exist under `providers:` below
      # purely as alias targets.
      aliases:
        # ALIAS NAMING CONVENTION — locked. Read this before adding rows.
        #
        # Format: "<Brand> · <Tier>"
        #   <Brand>  one of: Gemini, GPT, Claude, Gemma, … (the model family,
        #            no version number — the version-less name signals "alias
        #            for the family", not "this exact model").
        #   ·        U+00B7 middot (NOT the ASCII period). Quiet typographic
        #            separator that doesn't compete visually with star
        #            ratings (★★★★) on the same row.
        #   <Tier>   exactly one of:  Basic | Standard | Deep
        #            Basic     — cheapest member; first-pass / high-volume / OCR.
        #            Standard  — balanced default; most reviews.
        #            Deep      — most capable; complex reasoning, contradiction.
        #
        # Forbidden vocabulary in `name:` — caught and rewritten on review:
        #   "(auto)", "Latest", "Mini", "Normal", "Premium", "ChatGPT",
        #   "(Flash)", "(Sonnet)", parens around the concrete model.
        # Concrete model rows live under `providers.<key>.models[]` below;
        # those keep their literal brand+version names. Aliases sit on top.
        #
        # Fallback order across ALL aliases is fixed: OpenAI → OpenRouter →
        # Google Cloud. Each alias's `targets:` list is that global order
        # filtered to providers that actually serve the family.
        "any:gemini-flash":
          name: "Gemini · Standard"
          description: "Google Gemini family. Balanced workhorse for inspections."
          stars: 4
          targets:
            - "any:openrouter:google/gemini-3.1-flash-image-preview"
            - "any:google_cloud:gemini-3.1-flash-image-preview"
        "any:gemini-flash-lite":
          name: "Gemini · Basic"
          description: "Google Gemini family. Cheapest member; good for first-pass and high-volume runs."
          stars: 3
          targets:
            - "any:openrouter:google/gemini-3.1-flash-lite-preview"
            - "any:google_cloud:gemini-3.1-flash-lite-preview"
        "any:gemini-pro":
          name: "Gemini · Deep"
          description: "Google Gemini family. Top-tier reasoning for the trickiest pages."
          stars: 5
          targets:
            - "any:openrouter:google/gemini-3-pro-preview"
            - "any:google_cloud:gemini-3-pro-preview"
        "any:gpt-basic":
          name: "GPT · Basic"
          description: "OpenAI GPT family. Cost-effective workhorse for high-volume document review. Same family as Standard, smaller and faster."
          stars: 3
          targets:
            - "any:openai:gpt-4.1-mini-2025-04-14"
            - "any:openrouter:openai/gpt-4.1-mini"
        "any:gpt-normal":
          name: "GPT · Standard"
          description: "OpenAI GPT family. Reliable general-purpose model for most reviews."
          stars: 3
          targets:
            - "any:openai:gpt-4.1-2025-04-14"
            - "any:openrouter:openai/gpt-4.1"
        "any:gpt-deep":
          name: "GPT · Deep"
          description: "OpenAI GPT family. Flagship reasoning — slowest and most expensive, hardest to fool."
          stars: 5
          targets:
            - "any:openai:gpt-5.2-2025-12-11"
            - "any:openrouter:openai/gpt-5.2"

      providers:
        openrouter:
          name: "OpenRouter"
          base_url: "https://openrouter.ai/api/v1"
          temperature: 0.1
          default_model_id: "google/gemini-3.1-flash-image-preview"
          # `byok: true` → account owners may supply their own API key. With the
          # instance-wide `byok_enabled` flag also on, the row renders Add-key /
          # Rotate / Remove buttons. base_url is pinned (`custom: false`).
          byok: true
          headers:
            HTTP-Referer: "https://localhost"
            X-Title: "Revdoku Core"
          # OpenRouter request-body knobs, deep-merged into every request by
          # doc-api's applyPredefinedParams. See https://openrouter.ai/docs/features/privacy
          # and https://openrouter.ai/docs/api-reference/parameters.
          #
          #   data_collection: "deny"   — route only to providers whose policy
          #                                disallows training & prompt logging.
          #   zdr: true                 — further restrict to strict-ZDR providers.
          #   allow_fallbacks: false    — fail the request rather than silently
          #                                re-route to an upstream that doesn't
          #                                meet the policy. Without this, OR can
          #                                fall back to a non-deny provider when
          #                                the preferred one is unavailable.
          #   require_parameters: true  — only route to upstreams that actually
          #                                accept every field we send (we use
          #                                response_format: json_schema, which
          #                                some upstreams silently ignore).
          request_params:
            provider:
              data_collection: "deny"
              zdr: true
              allow_fallbacks: false
              require_parameters: true
          models:
            - id: "any:openrouter:openai/gpt-4.1"
              name: "GPT-4.1 (OpenRouter)"
              stars: 3
              revdoku_options: "revdoku_oi_type_1"
              description: "Reliable general-purpose model via OpenRouter."
              description_checklist: "Good balance for checklist generation."

            - id: "any:openrouter:openai/gpt-4.1-mini"
              name: "GPT-4.1 mini (OpenRouter)"
              stars: 3
              revdoku_options: "revdoku_oi_type_1"
              description: "Cost-effective GPT-4.1 variant via OpenRouter. Cheaper and faster than Standard, same family."
              description_checklist: "Cheap, fast checklist generation."

            - id: "any:openrouter:openai/gpt-5.2"
              name: "GPT-5.2 (OpenRouter)"
              stars: 5
              revdoku_options: "revdoku_oi_flagship_1"
              description: "Flagship reasoning. Best quality, slowest, most expensive."
              description_checklist: "Best for complex multi-section checklists."

            - id: "any:openrouter:google/gemini-3.1-flash-lite-preview"
              name: "Gemini 3.1 Flash Lite (OpenRouter)"
              stars: 2
              revdoku_options: "revdoku_g_gemma_1"
              description: "Cheapest Gemini option."
              description_checklist: "Fast and affordable."

            - id: "any:openrouter:google/gemini-3.1-flash-image-preview"
              name: "Gemini 3.1 Flash (OpenRouter)"
              stars: 3
              revdoku_options: "revdoku_g_gemma_1"
              description: "Workhorse Gemini for inspection."
              description_checklist: "Recommended for most checklists."

            - id: "any:openrouter:google/gemini-3-pro-preview"
              name: "Gemini 3 Pro (OpenRouter)"
              stars: 5
              revdoku_options: "revdoku_g_gemma_1"
              description: "Top Gemini. Thorough, slower."
              description_checklist: "Best for complex agreements."

        openai:
          name: "OpenAI"
          base_url: "https://api.openai.com/v1"
          temperature: 0.1
          default_model_id: "gpt-4.1-2025-04-14"
          byok: true
          # No request_params: OpenAI has no per-request privacy/ZDR header.
          # `store: false` (in each model's options) is the only meaningful knob
          # and it suppresses Responses-API thread storage but not abuse logs.
          # True ZDR requires an org-level contract with the provider.
          models:
            - id: "any:openai:gpt-4.1-2025-04-14"
              name: "GPT-4.1"
              stars: 3
              revdoku_options: "revdoku_oi_type_1"
              description: "Reliable general-purpose model."
              description_checklist: "Good balance for checklist generation."

            - id: "any:openai:gpt-4.1-mini-2025-04-14"
              name: "GPT-4.1 mini"
              stars: 3
              revdoku_options: "revdoku_oi_type_1"
              description: "Cost-effective GPT-4.1 variant. Cheaper and faster than Standard, same family — strong default for high-volume document review."
              description_checklist: "Cheap, fast checklist generation."

            - id: "any:openai:gpt-5.2-2025-12-11"
              name: "GPT-5.2"
              stars: 5
              revdoku_options: "revdoku_oi_flagship_1"
              description: "Flagship model. Best reasoning, highest cost."
              description_checklist: "Best for complex checklist generation."

        google_cloud:
          name: "Google Cloud"
          base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
          temperature: 0.1
          default_model_id: "gemini-3.1-flash-image-preview"
          byok: true
          # No request_params: Google's data retention is controlled at the
          # GCP project / Workspace contract level, not per-request. (operators
          # could add `safetySettings` here to relax over-eager content blocks
          # on legitimate document content — that's a quality decision, not a
          # privacy decision, so it's not enabled by default.)
          models:
            - id: "any:google_cloud:gemini-3.1-flash-lite-preview"
              name: "Gemini 3.1 Flash Lite"
              stars: 2
              revdoku_options: "revdoku_g_gemma_1"
              description: "Cheap Gemini direct from Google."
              description_checklist: "Fast and affordable."

            - id: "any:google_cloud:gemini-3.1-flash-image-preview"
              name: "Gemini 3.1 Flash"
              stars: 3
              revdoku_options: "revdoku_g_gemma_1"
              description: "Workhorse Gemini direct from Google."
              description_checklist: "Recommended for most checklists."

            - id: "any:google_cloud:gemini-3-pro-preview"
              name: "Gemini 3 Pro"
              stars: 5
              revdoku_options: "revdoku_g_gemma_1"
              description: "Premium Gemini direct from Google."
              description_checklist: "Best for complex documents."

        custom_llm_1:
          name: "Custom LLM 1"
          base_url: "http://localhost:1234/v1"
          temperature: 0.1
          default_model_id: "gemma-family"
          # "Custom LLM" covers anything OpenAI-compatible the operator can
          # reach over HTTP — local LM Studio / Ollama, a self-hosted vLLM /
          # llama.cpp server, or a remote OpenAI-compatible endpoint with its
          # own API key. Custom providers are region-agnostic — they live in
          # `regions.any` in BOTH editions because the data flow is
          # tenant-controlled.
          #
          #   byok: true     — account may supply its own api_key.
          #   custom: true   — account may override base_url AND maintain its
          #                    own per-account models list (gated by the
          #                    instance-wide `byok_customizable` flag — turn
          #                    OFF in multi-tenant cloud to close the SSRF
          #                    surface a tenant-supplied URL would open).
          byok: true
          custom: true
          # Symbolic placeholders that only surface when an operator lacks any
          # user-defined custom-LLM models. The Providers tab on /account/ai is
          # the intended way to register real models; these two keep the UI
          # honest about provider reachability.
          models:
            - id: "any:custom_llm_1:gemma-family"
              name: "Gemma Family"
              stars: 1
              revdoku_options: "revdoku_g_gemma_1"
              description: "Local Gemma-family model. Zero credit cost."
              description_checklist: "Local Gemma model. Zero credit cost."

            - id: "any:custom_llm_1:generic"
              name: "Generic LLM"
              stars: 1
              description: "Any OpenAI-compatible endpoint. Configure on /account/ai."
              description_checklist: "Any OpenAI-compatible endpoint."
