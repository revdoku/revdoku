# Named bundles of request-envelope fields Rails merges into the doc-api
# config before each call. A model references a preset via
# `revdoku_options: "<preset_key>"` in ai_models.yml (catalog) OR in a
# user-defined local model entry on an account's ai_provider_keys blob.
# Explicit model-level fields still win over preset values (escape hatch).
#
# Keep ai_models.yml strictly for models + aliases; put reusable
# behaviour bundles here.
#
# Naming convention: `revdoku_<family>_<variant>`.
# Add more presets only when a new tuple pattern shows up in a real model.

presets:
  revdoku_g_gemma_1:
    desc: "Best for Google Gemini / Gemma models."
    max_pages: 3
    options:
      max_tokens: 65536
    grid_mode: "overlay_grid_2_5"
    ai_coord_scale: 1000
    response_format: "json_schema"

  revdoku_oi_type_1:
    desc: "Best for general OpenAI GPT-4.x models."
    max_pages: 3
    options:
      max_completion_tokens: 32768
      store: false
    response_format: "json_schema"

  revdoku_oi_reasoning_1:
    desc: "Best for OpenAI reasoning models (o-series: o3, o4-mini)."
    max_pages: 3
    # OpenAI's o-series reject any custom temperature with
    # "Unsupported value: 'temperature' does not support 0.1 with this
    # model. Only the default (1) value is supported." — pin to 1 here so
    # the preset overrides the provider-level 0.1.
    temperature: 1
    options:
      max_completion_tokens: 65536
      store: false
    response_format: "json_schema"

  revdoku_oi_flagship_1:
    desc: "Best for OpenAI flagship models (GPT-5, GPT-5.2)."
    max_pages: 3
    options:
      max_completion_tokens: 128000
      store: false
    response_format: "json_schema"

  revdoku_anthropic_claude_1:
    desc: "Best for Anthropic Claude models (Sonnet / Opus, direct or via Bedrock)."
    max_pages: 3
    options:
      max_tokens: 64000
    response_format: "json_schema"
