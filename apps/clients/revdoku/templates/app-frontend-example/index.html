<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revdoku App Example</title>
  <!--
    Cloudflare Turnstile is required for every public WRITE action when the app
    database has turnstile_required_for_public_writes = true. Load the script
    once; app.js renders one visible managed widget and sends the token.
    A console message like "Blocked a frame with origin
    https://challenges.cloudflare.com ..." is a harmless Cloudflare warning.
  -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 36rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    h1 { font-size: 1.5rem; }
    form { display: grid; gap: .75rem; margin-bottom: 1.5rem; }
    input { font-size: 16px; padding: .6rem .7rem; border: 1px solid #8884; border-radius: .5rem; }
    button { font-size: 1rem; padding: .6rem 1rem; border: 0; border-radius: .5rem; background: #4f46e5; color: #fff; cursor: pointer; }
    button:disabled { opacity: .6; cursor: default; }
    #msg { min-height: 1.25rem; font-size: .9rem; color: #777; }
    ul { list-style: none; padding: 0; }
    li { padding: .6rem 0; border-bottom: 1px solid #8883; }
  </style>
</head>
<body>
  <h1>Ideas</h1>

  <form id="form">
    <input id="title" placeholder="Share an idea…" maxlength="200" autocomplete="off" required>
    <!-- Visible managed widget: stays unobtrusive for most visitors and only
         shows a checkbox when Cloudflare decides a challenge is needed. -->
    <div id="cf-turnstile"></div>
    <button id="submit" type="submit">Post</button>
    <span id="msg"></span>
  </form>

  <ul id="list"><li>Loading…</li></ul>

  <script src="/app.js"></script>
</body>
</html>
